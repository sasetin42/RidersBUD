<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RidersBUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* Custom styles for Leaflet marker clusters */
        .marker-cluster-ridersbud {
            background-color: rgba(254, 120, 3, 0.7);
            border: 2px solid #FE7803;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 0 8px rgba(254, 120, 3, 0.5);
        }
        .marker-cluster-ridersbud div {
            width: 36px;
            height: 36px;
            margin-left: 2px;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .marker-cluster-ridersbud span {
            font-size: 14px;
        }
        /* Custom styles for Admin LiveMap logo markers */
        .custom-marker-div-icon {
            background: transparent;
            border: none;
        }
        .custom-marker-container {
            position: relative;
            width: 36px;
            height: 36px;
        }
        .custom-marker-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #28a745; /* Green for available */
            box-shadow: 0 0 8px rgba(40, 167, 69, 0.7);
        }
        .custom-marker-image.unavailable {
            border-color: #dc3545; /* Red for unavailable */
            box-shadow: 0 0 8px rgba(220, 53, 69, 0.7);
            filter: grayscale(80%);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FE7803',
                        secondary: '#171617',
                        field: '#202938',
                        'light-gray': '#A0A0A0',
                        'dark-gray': '#2A2A2A',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        scaleUp: {
                            '0%': { transform: 'scale(0.95)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    },
                    animation: {
                        fadeIn: 'fadeIn 0.2s ease-out forwards',
                        scaleUp: 'scaleUp 0.2s ease-out forwards',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.1/dist/leaflet.markercluster.js"></script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react-router-dom": "https://esm.sh/react-router-dom@6.23.1?deps=react@18.2.0,react-dom@18.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.21.0"
  }
}
</script>
</head>
<body class="bg-secondary">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
